<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Contact | Ramya V Portfolio</title>

  <meta
    name="description"
    content="Contact Ramya V for collaboration, projects, and opportunities."
  />

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <a class="skip-link" href="#main-content">Skip to Main Content</a>

  <header>
    <div class="container">

      <h1>Ramya V</h1>

      <nav aria-label="Main Navigation">
        <ul class="nav-list">
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="projects.html">Projects</a></li>
          <li><a href="contact.html" aria-current="page">Contact</a></li>
        </ul>
      </nav>

    </div>
  </header>

  <main id="main-content">

    <section aria-labelledby="contact-heading">
      <div class="container">

        <h2 id="contact-heading">Contact Me</h2>

        <!-- ACCESSIBLE FORM -->
        <form aria-label="Contact Form">

          <!-- NAME -->
          <div class="form-group">
            <label for="name">Full Name</label>

            <input
              type="text"
              id="name"
              name="name"
              required
              aria-required="true"
            />
          </div>

          <!-- EMAIL -->
          <div class="form-group">
            <label for="email">Email Address</label>

            <input
              type="email"
              id="email"
              name="email"
              required
              aria-required="true"
            />
          </div>

          <!-- MESSAGE -->
          <div class="form-group">
            <label for="message">Message</label>

            <textarea
              id="message"
              name="message"
              rows="5"
              required
              aria-required="true"
            ></textarea>
          </div>

          <!-- BUTTON -->
          <button type="submit">
            Send Message
          </button>

        </form>

      </div>
    </section>

  </main>

  <footer>
    <div class="container">
      <p>&copy; 2026 Ramya V</p>
    </div>
  </footer>

</body>
</html>
